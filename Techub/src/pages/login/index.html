<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela De Login - Techub</title>
    <link rel="stylesheet" href="../login/css/styles.css">
</head>

<body>
    <main>
        <div class="container">
            <img src="../../assets/imagem/svg/logo-escura.svg" alt="Logo Techub">
            <h1 class="titulo">Techub</h1>
        </div>

        <div class="informacoes">
            <h1>Sua história começa aqui.</h1>
            <p>Email</p>
            <input type="email" name="Email" placeholder="Email ou número de telefone">
        </div>
        <div class="informacoes">
            <p>Senha</p>
            <input type="password" name="Senha" placeholder="Senha">
            <span class="olho" onclick="toggleSenha()"></span>
        </div>
        <div class="esqueceu-senha">
            <a href="#">Esqueceu a senha?</a>
        </div>
        <div class="botao">
            <button>Entrar</button>
        </div>
        <div class="linha">
        </div>
        <div class="criar-conta">
            <p>Não tem uma conta?</p><a href="#">Cadastre-se</a>
    </main>
</body>

</html>
